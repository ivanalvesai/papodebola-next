services:
  nextjs:
    build: .
    container_name: papodebola-next
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    volumes:
      - pdb-data:/app/data
      # Cache do Next (ISR + dados da API) persistido entre deploys: o site serve
      # os dados antigos e so troca quando a API responde de novo (nao fica vazio).
      - pdb-next-cache:/app/.next/cache
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - pdb-net

volumes:
  pdb-data:
  pdb-next-cache:

networks:
  # Rede compartilhada com o container do Postgres (Payload). Externa: precisa
  # existir no host (`docker network create pdb-net`) antes do `compose up`.
  pdb-net:
    external: true
