events { worker_connections 1024; }
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    upstream api { server api:3001; }
    upstream web { server web:3000; }
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    proxy_cache_path /tmp/img_cache levels=1:2 keys_zone=img_cache:10m max_size=200m inactive=7d;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css text/xml image/svg+xml;
    client_max_body_size 50M;

    # SIGNSIMPLES HTTP
    server {
        listen 80;
        server_name signsimples.com.br;
        location /.well-known/acme-challenge/ { root /var/www/certbot; }
        location / { return 301 https://signsimples.com.br$request_uri; }
    }

    # SIGNSIMPLES HTTPS
    server {
        listen 443 ssl;
        http2 on;
        server_name signsimples.com.br;
        ssl_certificate /etc/letsencrypt/live/signsimples.com.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/signsimples.com.br/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        location /socket.io/ {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        location / {
            proxy_pass http://web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

    # AI TECNOLOGIA
    server {
        listen 80;
        server_name posts.aitecnologia.net;
        location / {
            proxy_pass http://172.17.0.1:5050;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600;
        }
    }

    # PAPODEBOLA HTTP
    server {
        listen 80;
        server_name papodebola.com.br www.papodebola.com.br;
        location / { return 301 https://papodebola.com.br$request_uri; }
    }

    # PAPODEBOLA HTTPS - Next.js
    server {
        listen 443 ssl;
        http2 on;
        server_name papodebola.com.br www.papodebola.com.br;

        ssl_certificate /etc/nginx/ssl-papodebola/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl-papodebola/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Sofascore image proxies (nginx cache)
        location /img/player/ {
            proxy_pass https://api.sofascore.app/api/v1/player/;
            proxy_set_header Host api.sofascore.app;
            proxy_set_header Referer "https://www.sofascore.com/";
            proxy_hide_header Set-Cookie;
            proxy_cache img_cache;
            proxy_cache_valid 200 7d;
            proxy_cache_valid 404 1h;
            expires 7d;
        }

        location /img/team/ {
            proxy_pass https://api.sofascore.app/api/v1/team/;
            proxy_set_header Host api.sofascore.app;
            proxy_set_header Referer "https://www.sofascore.com/";
            proxy_hide_header Set-Cookie;
            proxy_cache img_cache;
            proxy_cache_valid 200 7d;
            proxy_cache_valid 404 1h;
            expires 7d;
        }

        # Old article URLs redirect (.html -> clean URL)
        location ~ ^/artigos/(.+)\.html$ {
            return 301 /artigos/$1;
        }

        # Old page URLs redirect
        location = /pages/noticias.html { return 301 /noticias; }
        location = /pages/agenda.html { return 301 /agenda; }
        location = /pages/ao-vivo.html { return 301 /ao-vivo; }
        location = /pages/sobre.html { return 301 /sobre; }
        location = /pages/contato.html { return 301 /contato; }
        location = /pages/privacidade.html { return 301 /privacidade; }

        # Everything else -> Next.js
        location / {
            proxy_pass http://172.17.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 60s;
        }

        location ~ /\.git {
            deny all;
            return 404;
        }

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

    # PAPODEBOLA port 8090 - Next.js
    server {
        listen 8090;
        server_name _;

        location /img/player/ {
            proxy_pass https://api.sofascore.app/api/v1/player/;
            proxy_set_header Host api.sofascore.app;
            proxy_set_header Referer "https://www.sofascore.com/";
            proxy_cache img_cache;
            proxy_cache_valid 200 7d;
            expires 7d;
        }

        location /img/team/ {
            proxy_pass https://api.sofascore.app/api/v1/team/;
            proxy_set_header Host api.sofascore.app;
            proxy_set_header Referer "https://www.sofascore.com/";
            proxy_cache img_cache;
            proxy_cache_valid 200 7d;
            expires 7d;
        }

        location / {
            proxy_pass http://172.17.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # PAPODEBOLA WORDPRESS ADMIN - HTTP redirect
    server {
        listen 80;
        server_name admin.papodebola.com.br;
        location /.well-known/acme-challenge/ { root /var/www/papodebola; }
        location / { return 301 https://admin.papodebola.com.br$request_uri; }
    }

    # PAPODEBOLA WORDPRESS ADMIN - HTTPS
    server {
        listen 443 ssl;
        http2 on;
        server_name admin.papodebola.com.br;
        ssl_certificate /etc/nginx/ssl-admin-papodebola/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl-admin-papodebola/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        client_max_body_size 64M;

        location / {
            proxy_pass http://172.17.0.1:8091;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 300;
        }

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000" always;
    }
}
